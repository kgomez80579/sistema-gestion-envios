<!-- Fragmento #1 que irá en el head de todas las páginas -->
<head th:fragment="head">
    <title>Sistema Gestión de Envíos</title>
    <meta charset="UTF-8"/>

    <link th:href="@{/webjars/bootstrap/css/bootstrap.min.css}" rel="stylesheet"/>
    <link th:href="@{/webjars/font-awesome/css/all.css}" rel="stylesheet"/>

    <script th:src="@{/webjars/jquery/jquery.min.js}"></script>
    <script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
</head>


<!-- Fragmento #2 define el encabezado de las páginas -->
<header th:fragment="header" class="header">
    <nav class="navbar navbar-expand-sm navbar-dark bg-dark p-0">
        <div class="container">

            <a th:href="@{/}" class="navbar-brand">
                [[#{aplicacion.titulo}]]
            </a>

            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navbarCollapse">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse justify-content-between" id="navbarCollapse">

                <ul class="navbar-nav">
                    <li class="nav-item px-2">
                        <a class="nav-link" th:href="@{/paquete/listado}">
                            [[#{plantilla.paquetes}]]
                        </a>
                    </li>

                    <li class="nav-item px-2">
                        <a class="nav-link" th:href="@{/usuario/listado}">
                            [[#{plantilla.usuarios}]]
                        </a>
                    </li>
                </ul>

                <ul class="navbar-nav">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" data-bs-toggle="dropdown" href="#" role="button">
                            [[#{plantilla.idioma}]]
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" th:href="@{/(lang=es)}">Español</a></li>
                            <li><a class="dropdown-item" th:href="@{/(lang=en)}">English</a></li>
                        </ul>
                    </li>

                    <li class="nav-item px-2">
                        <form th:action="@{/logout}" method="post">
                            <button class="btn btn-outline-light btn-sm" type="submit">
                                Cerrar sesión
                            </button>
                        </form>
                    </li>
                </ul>

            </div>
        </div>
    </nav>

    <section id="main-header" class="py-2 bg-success text-white">
        <div class="container">
            <div class="row">
                <div class="col-md-8">
                    <h1>
                        <i class="fas fa-truck"></i>
                        [[#{plantilla.sistema}]]
                    </h1>
                </div>
            </div>
        </div>
    </section>
</header>


<!-- Fragmento #3 define el footer -->
<footer th:fragment="footer" class="p-2 mt-5 bg-info text-white">
    <p class="lead text-center">[[#{plantilla.derechos}]] &COPY;</p>

    <script>
        const confirmModal = document.getElementById('confirmModal');

        if (confirmModal) {
            confirmModal.addEventListener('show.bs.modal', event => {
                const button = event.relatedTarget;

                const id = button.getAttribute('data-bs-id');
                const descripcion = button.getAttribute('data-bs-descripcion');

                const modalId = confirmModal.querySelector('#modalId');
                const modalDescripcion = confirmModal.querySelector('#modalDescripcion');

                modalId.value = id;
                modalDescripcion.textContent = descripcion;
            });
        }
    </script>
</footer>


<!-- Fragmento #4 define una ventana tipo Toast para mostrar mensajes al usuario -->
<section th:fragment="mostrarToast">
    <div aria-live="polite" aria-atomic="true"
         class="position-fixed top-50 start-50 translate-middle"
         style="z-index: 1080;">

        <div th:if="${error}" class="toast show"
             role="alert"
             aria-live="assertive"
             aria-atomic="true"
             data-bs-autohide="true">

            <div class="toast-header text-white bg-danger">
                <i class="fa-solid fa-bomb"></i>
                <strong class="me-auto">[[#{error}]]</strong>
            </div>

            <div class="toast-body">
                <p>[[${error}]]</p>
                <div class="mt-2 pt-2 border-top text-center">
                    <button type="button"
                            class="btn btn-secondary btn-sm"
                            data-bs-dismiss="toast">
                        [[#{accion.cerrar}]]
                    </button>
                </div>
            </div>
        </div>

        <div th:if="${todoOk}" class="toast show"
             role="status"
             aria-live="polite"
             aria-atomic="true"
             data-bs-autohide="true">

            <div class="toast-header text-white bg-success">
                <i class="fa-solid fa-square-check"></i>
                <strong class="me-auto">[[#{atencion}]]</strong>
            </div>

            <div class="toast-body">
                <p>[[${todoOk}]]</p>
                <div class="mt-2 pt-2 border-top text-center">
                    <button type="button"
                            class="btn btn-secondary btn-sm"
                            data-bs-dismiss="toast">
                        [[#{accion.cerrar}]]
                    </button>
                </div>
            </div>
        </div>

    </div>
</section>
